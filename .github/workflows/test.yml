name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true # Don't block on moderate vulnerabilities

      - name: Build TypeScript
        run: npm run build

      - name: Run CI tests
        run: npm run test:ci

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "CI tests verify input validation, FTS5 query builder, tool registry," >> $GITHUB_STEP_SUMMARY
          echo "and robustness edge cases without requiring the production database." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production and golden tests require the 1.6GB GLEIF database" >> $GITHUB_STEP_SUMMARY
          echo "and should be run locally: \`npm test\` and \`npm run test:golden\`" >> $GITHUB_STEP_SUMMARY
