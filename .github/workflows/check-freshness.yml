name: Check Data Freshness

on:
  schedule:
    # Run daily at 06:00 UTC (after the 03:00 sync window)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-freshness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        run: npm run build

      - name: Check data freshness via health endpoint
        id: freshness
        run: |
          # Query the public MCP health endpoint
          HEALTH_URL="${{ vars.GLEIF_HEALTH_URL || 'https://mcp.ansvar.eu/gleif/health' }}"
          echo "Checking freshness at $HEALTH_URL"

          HTTP_STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" "$HEALTH_URL" || echo "000")

          if [ "$HTTP_STATUS" = "000" ]; then
            echo "status=unreachable" >> "$GITHUB_OUTPUT"
            echo "## Freshness Check: UNREACHABLE" >> "$GITHUB_STEP_SUMMARY"
            echo "Health endpoint could not be reached." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/health.json

          FRESHNESS=$(jq -r '.database.freshness_status // "unknown"' /tmp/health.json 2>/dev/null || echo "unknown")
          DATA_AGE=$(jq -r '.database.data_age_hours // "unknown"' /tmp/health.json 2>/dev/null || echo "unknown")
          ENTITY_COUNT=$(jq -r '.database.entity_count // "unknown"' /tmp/health.json 2>/dev/null || echo "unknown")

          echo "status=$FRESHNESS" >> "$GITHUB_OUTPUT"
          echo "data_age=$DATA_AGE" >> "$GITHUB_OUTPUT"
          echo "entity_count=$ENTITY_COUNT" >> "$GITHUB_OUTPUT"

          echo "## Freshness Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Freshness Status | $FRESHNESS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Data Age (hours) | $DATA_AGE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Entity Count | $ENTITY_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HTTP Status | $HTTP_STATUS |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FRESHNESS" = "critical" ]; then
            echo "::error::Database freshness is CRITICAL (>72h). Sync may be failing."
            exit 1
          elif [ "$FRESHNESS" = "stale" ]; then
            echo "::warning::Database freshness is STALE (>24h). Sync may be delayed."
          fi
